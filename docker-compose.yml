services:

  qdrant:
    image: qdrant/qdrant:latest
    container_name: stpneon_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"   # gRPC (optionnel)
    volumes:
      - ./qdrant_data:/qdrant/storage
    networks:
      - stpneon_net
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stpneon_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Remplace l'URL Qdrant par le nom du service Docker
      QDRANT_URL: http://qdrant:6333
    depends_on:
      - qdrant
    networks:
      - stpneon_net
    restart: unless-stopped
    # Pour accéder à Ollama tournant sur la machine hôte (hors Docker)
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  stpneon_net:
    driver: bridge
